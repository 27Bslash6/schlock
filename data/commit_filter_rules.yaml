# Commit Message Filter Rules
# Pattern-based filtering to remove unwanted content from commit messages

# Version
version: "1.0.0"

# Policy for commit messages whose content is NOT in the command string (issue #76):
# delivery via -F/--file (a file or stdin) or an unevaluated $(...)/backtick substitution.
# Such content cannot be scanned before the command runs, so schlock cannot strip a Claude
# trailer from it. This setting decides what happens when such a commit is detected:
#   off   - silent pass-through (legacy behavior; the gap is invisible)
#   warn  - allow the commit but tell the model the message was not scanned (DEFAULT)
#   block - deny the commit; the message must be inlined with -m to be scannable
# This value is read from THIS bundled rules file. User/project override of commit_filter
# settings is not yet wired (load_filter_config loads plugin defaults only), so edit it here.
# NOTE: legitimate message reuse (git commit --amend --no-edit, -C/-c, --squash/--fixup,
# --template, bare `git commit`) is NEVER flagged - there is no new content to smuggle.
unscannable_message_action: warn

# Rule Categories
# Each category can be independently enabled/disabled
rules:
  # Advertising patterns (default enabled)
  advertising:
    description: "Remove promotional content and advertising from commit messages"
    enabled: true  # Default: enabled (most users want clean commits)
    patterns:
      # Broad line-level patterns FIRST (prevent partial matches from mangling lines)
      - pattern: "(?i)\\n*🤖.*Generated\\s+with.*\\n*"
        description: "Any line with robot emoji and 'Generated with'"
        replacement: "\n"

      - pattern: "(?i)\\n*Co-Authored-By:.*(?:Claude|@anthropic\\.com|@multica\\.ai).*\\n*"
        description: "Any Co-Authored-By line mentioning Claude, Anthropic, or Multica"
        replacement: "\n"

      # Specific patterns (catch remnants the broad patterns might miss)
      - pattern: "(?i)🤖\\s*Generated\\s+with\\s+\\[Claude\\s+Code\\]\\(https://claude\\.com/claude-code\\)"
        description: "Claude Code promotional link with emoji"
        replacement: ""

      - pattern: "(?i)Co-Authored-By:\\s*Claude\\s*<noreply@anthropic\\.com>"
        description: "Claude Code co-author attribution line"
        replacement: ""

      - pattern: "(?i)Generated\\s+with\\s+Claude\\s+Code"
        description: "Claude Code generation notice (text-only)"
        replacement: ""

      - pattern: "(?i)claude\\.com/claude-code"
        description: "Claude Code website link"
        replacement: ""

      - pattern: "(?i)noreply@anthropic\\.com"
        description: "Anthropic noreply email address"
        replacement: ""

      - pattern: "(?i)Co-Authored-By:\\s*Claude(?![\\w])"
        description: "Claude co-author attribution (generic)"
        replacement: ""

  # Future categories (disabled by default - templates for users)
  #
  # profanity:
  #   description: "Remove profanity and offensive language"
  #   enabled: false
  #   patterns:
  #     - pattern: "example_pattern"
  #       description: "Example profanity pattern"
  #       replacement: "[redacted]"
  #
  # compliance:
  #   description: "Enforce company commit message policies"
  #   enabled: false
  #   patterns:
  #     - pattern: "CONFIDENTIAL"
  #       description: "Remove confidential markers"
  #       replacement: ""

# Global filter settings
settings:
  # Trim consecutive blank lines after filtering
  trim_blank_lines: true
  max_consecutive_blanks: 2

  # Strip trailing whitespace from lines
  strip_trailing_whitespace: true

  # Minimum message length after filtering (characters)
  min_message_length: 1
